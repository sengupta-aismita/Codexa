<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="codexaGradient" x1="40" y1="40" x2="216" y2="216" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366F1"></stop>
      <stop offset="1" stop-color="#8B5CF6"></stop>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="coloredBlur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="20" y="20" width="216" height="216" rx="52" fill="#070B14"></rect>

  <!-- C shape -->
  <path d="M170 78
       C150 58, 118 52, 90 68
       C58 86, 46 124, 60 158
       C75 194, 116 210, 152 194" stroke="url(#codexaGradient)" stroke-width="18" stroke-linecap="round" fill="none" filter="url(#glow)"></path>

  <!-- Code bracket -->
  <path d="M108 102 L86 128 L108 154" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"></path>

  <!-- AI sparkle -->
  <path d="M178 72 L182 84 L194 88 L182 92 L178 104 L174 92 L162 88 L174 84 Z" fill="white" opacity="0.95"></path>
</svg>